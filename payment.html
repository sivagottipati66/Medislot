<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🏥 MedCare</a>

        <div>
            <a class="nav-link d-inline text-white" href="/hospitals">Hospitals</a>
            <a class="nav-link d-inline text-white" href="/checkout">
                Cart ({{ cart_count }})
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">

<h2>Payment</h2>

<form method="POST" enctype="multipart/form-data">

<select name="payment_status" class="form-control">
<option>Paid</option>
<option>Not Paid</option>
<option>Under Process</option>
</select>

<br>

<input type="text" name="reference_id" placeholder="Reference ID" class="form-control"><br>

<input type="file" name="screenshot" class="form-control"><br>

<button class="btn btn-success">Submit</button>

</form>

</div>

</body>
</html>
