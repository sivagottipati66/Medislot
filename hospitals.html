<!DOCTYPE html>
<html>
<head>
    <title>Hospitals</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🏥 MedCare</a>

        <div>
            <a class="nav-link d-inline text-white" href="/">Home</a>
            <a class="nav-link d-inline text-white" href="/hospitals">Hospitals</a>
            <a class="nav-link d-inline text-white" href="/checkout">
                Cart ({{ cart_count }})
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">Select Hospital</h2>

    <!-- DEBUG PRINT -->
    <p>Total Hospitals: {{ hospitals|length }}</p>

    <div class="row">
        {% for h in hospitals %}
        <div class="col-md-4">
            <div class="card p-3 mb-3">

                <!-- ✅ FIXED ACCESS -->
                <h4>{{ h['name'] }}</h4>
                <p>{{ h['location'] }}</p>

                <a href="/doctors/{{ h['id'] }}" class="btn btn-success">
                    View Doctors
                </a>

            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
