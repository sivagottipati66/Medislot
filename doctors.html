<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🏥 MedCare</a>

        <div>
            <a class="nav-link d-inline text-white" href="/hospitals">Hospitals</a>
            <a class="nav-link d-inline text-white" href="/checkout">
                Cart ({{ cart_count }})
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">Doctors</h2>

    <div class="row">

        {% for doc in doctors %}
        <div class="col-md-4">
            <div class="card p-3 mb-3">

                <h4>{{ doc['name'] }}</h4>
                <p>{{ doc['specialization'] }}</p>

                <!-- ✅ IMPORTANT FIX -->
                <a href="/slots/{{ doc['id'] }}" class="btn btn-success">
                    View Slots
                </a>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
