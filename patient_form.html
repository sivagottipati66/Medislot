<!DOCTYPE html>
<html>
<head>
    <title>Patient Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🏥 MedCare</a>

        <div>
            <a class="nav-link d-inline text-white" href="/hospitals">Hospitals</a>
            <a class="nav-link d-inline text-white" href="/checkout">
                Cart ({{ cart_count }})
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">Enter Patient Details</h2>

    <form method="POST" class="card p-4">

        <input type="text" name="name" placeholder="Name" class="form-control" required><br>
        <input type="number" name="age" placeholder="Age" class="form-control" required><br>

        <select name="gender" class="form-control">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select><br>

        <button class="btn btn-primary">Add to Cart</button>

    </form>

</div>

</body>
</html>
