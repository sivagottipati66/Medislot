<!DOCTYPE html>
<html>
<head>
    <title>Slots</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🏥 MedCare</a>

        <div>
            <a class="nav-link d-inline text-white" href="/hospitals">Hospitals</a>
            <a class="nav-link d-inline text-white" href="/checkout">
                Cart ({{ cart_count }})
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">Available Slots</h2>

    <div class="row">

        {% for slot in slots %}
        <div class="col-md-3">
            <div class="card p-3 mb-3 text-center">

                <h5>{{ slot['time'] }}</h5>

                <!-- ✅ IMPORTANT FIX -->
                <a href="/patient_form/{{ slot['id'] }}" class="btn btn-warning">
                    Book
                </a>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
